name: CI
on:
  pull_request:
  push:
    branches: [main]

env:
  DATABASE_URL: postgres://bloopy:bloopy@localhost:5432/bloopy
  APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  DEMO_MODE: "true"
  PUBLIC_BASE_URL: http://localhost:3000

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --silent
      - id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.typecheck.outcome == 'failure'
        with:
          name: typecheck-log
          path: typecheck.log
      - if: steps.typecheck.outcome == 'failure'
        run: cat typecheck.log && exit 1
      - id: tests
        continue-on-error: true
        run: npm test > test.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.tests.outcome == 'failure'
        with:
          name: test-log
          path: test.log
      - if: steps.tests.outcome == 'failure'
        run: cat test.log && exit 1
      - run: npm run build

  migration:
    needs: code
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bloopy
          POSTGRES_PASSWORD: bloopy
          POSTGRES_DB: bloopy
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bloopy -d bloopy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --silent
      - run: npm run migrate
