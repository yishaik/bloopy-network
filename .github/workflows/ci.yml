name: CI
on:
  pull_request:
  push:
    branches: [main]

env:
  DATABASE_URL: postgres://bloopy:bloopy@localhost:5432/bloopy
  # CI-only key; never used outside workflows
  APP_ENCRYPTION_KEY: NPqzBcDWPKtbd03eoulJ6pE0kPNeLcOAkPNgU2KcmtE=
  DEMO_MODE: "true"
  PUBLIC_BASE_URL: http://localhost:3000
  TELEGRAM_MANAGER_BOT_TOKEN: ci-fake-manager-token

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --silent
      - id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.typecheck.outcome == 'failure'
        with:
          name: typecheck-log
          path: typecheck.log
      - if: steps.typecheck.outcome == 'failure'
        run: cat typecheck.log && exit 1
      - id: tests
        continue-on-error: true
        run: npm test > test.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.tests.outcome == 'failure'
        with:
          name: test-log
          path: test.log
      - if: steps.tests.outcome == 'failure'
        run: cat test.log && exit 1
      - run: npm run build

  migration:
    needs: code
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bloopy
          POSTGRES_PASSWORD: bloopy
          POSTGRES_DB: bloopy
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bloopy -d bloopy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --silent
      - run: npm run migrate
      - id: memory_smoke
        continue-on-error: true
        run: npm run test:memory-db -w @bloopy/server > memory-db-smoke.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.memory_smoke.outcome == 'failure'
        with:
          name: memory-db-smoke-log
          path: memory-db-smoke.log
      - if: steps.memory_smoke.outcome == 'failure'
        run: cat memory-db-smoke.log && exit 1
      - id: notification_smoke
        continue-on-error: true
        run: npm run test:notifications-db -w @bloopy/server > notifications-db-smoke.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.notification_smoke.outcome == 'failure'
        with:
          name: notifications-db-smoke-log
          path: notifications-db-smoke.log
      - if: steps.notification_smoke.outcome == 'failure'
        run: cat notifications-db-smoke.log && exit 1
      - id: openrouter_smoke
        continue-on-error: true
        run: npm run test:openrouter-db -w @bloopy/server > openrouter-db-smoke.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.openrouter_smoke.outcome == 'failure'
        with:
          name: openrouter-db-smoke-log
          path: openrouter-db-smoke.log
      - if: steps.openrouter_smoke.outcome == 'failure'
        run: cat openrouter-db-smoke.log && exit 1
      - id: telegram_control_smoke
        continue-on-error: true
        run: npm run test:telegram-control-db -w @bloopy/server > telegram-control-db-smoke.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.telegram_control_smoke.outcome == 'failure'
        with:
          name: telegram-control-db-smoke-log
          path: telegram-control-db-smoke.log
      - if: steps.telegram_control_smoke.outcome == 'failure'
        run: cat telegram-control-db-smoke.log && exit 1
