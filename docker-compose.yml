services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bloopy
      POSTGRES_PASSWORD: bloopy
      POSTGRES_DB: bloopy
    ports:
      - "5432:5432"
    volumes:
      - bloopy_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloopy -d bloopy"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  bloopy_pg:
