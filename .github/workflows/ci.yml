name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bloopy
          POSTGRES_PASSWORD: bloopy
          POSTGRES_DB: bloopy
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bloopy -d bloopy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://bloopy:bloopy@localhost:5432/bloopy
      APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DEMO_MODE: "true"
      PUBLIC_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run migrate
